<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Rundurance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="icon"
      href="../assets/images/favicon_rundurance.png"
      type="image/png"
    />
  </head>

  <body
    class="bg-slate-100 text-slate-900 min-h-screen flex items-center justify-center font-[Inter]"
  >
    <!-- Login Card -->
    <div
      class="w-full max-w-md bg-white border border-slate-200 rounded-xl p-8"
    >
      <!-- Logo -->
      <div class="flex flex-col items-center mb-8">
        <img
          src="../assets/images/logo_rundurance.png"
          class="w-32 mb-4"
          alt="Rundurance Logo"
        />
        <h1 class="text-2xl font-bold tracking-tight">Bienvenido</h1>
        <p class="text-slate-500 text-sm mt-1">Accede a tu dashboard</p>
      </div>

      <!-- Form -->
      <form id="loginForm" method="post" class="space-y-6">
        <!-- Email -->
        <div>
          <label class="block text-sm text-slate-500 mb-2">
            Correo electrónico
          </label>
          <div class="relative">
            <i
              class="bi bi-envelope absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
            ></i>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="username"
              placeholder="ejemplo@correo.com"
              class="w-full bg-white border border-slate-200 rounded-md pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400 transition-all"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm text-slate-500 mb-2"> Contraseña </label>
          <div class="relative">
            <i
              class="bi bi-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
            ></i>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="••••••••"
              class="w-full bg-white border border-slate-200 rounded-md pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400 transition-all"
            />
          </div>
        </div>

        <!-- Remember -->
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 text-slate-500">
            <input type="checkbox" class="accent-sky-400" />
            Recordarme
          </label>
          <a href="#" id="forgot-password" class="text-sky-500 hover:text-sky-700 transition-colors">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <!-- Forgot password message -->
        <p id="forgot-msg" class="hidden text-sm text-sky-600 bg-sky-50 border border-sky-200 rounded-md px-3 py-2"></p>

        <!-- Error message -->
        <p
          id="login-error"
          class="hidden text-sm text-red-500 bg-red-50 border border-red-200 rounded-md px-3 py-2"
        ></p>

        <!-- Button -->
        <button
          type="submit"
          class="w-full bg-sky-400 hover:bg-sky-500 text-white font-medium py-3 rounded-md transition-colors"
        >
          Iniciar sesión
        </button>
      </form>

      <!-- Back link -->
      <p class="text-center text-xs text-slate-400 mt-6">
        <a href="dashboard.html" class="hover:text-sky-500 transition-colors"
          >← Volver al inicio</a
        >
      </p>

      <!-- Footer -->
      <p class="text-center text-xs text-slate-400 mt-2">© 2026 Rundurance</p>
    </div>

    <script type="module" src="../assets/js/login.js"></script>
  </body>
</html>
