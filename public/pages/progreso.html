<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progreso - Rundurance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="icon"
      href="../assets/images/favicon_rundurance.png"
      type="image/png"
    />
  </head>
  <body class="bg-slate-100 text-slate-900 min-h-screen flex font-[Inter]">
    <!-- Sidebar -->
    <aside
      class="w-64 border-r border-slate-200 flex flex-col fixed h-full bg-white z-20"
    >
      <div class="p-6">
        <img
          src="../assets/images/logo_rundurance.png"
          alt="Rundurance Logo"
          class="rounded-md"
        />
      </div>

      <nav class="flex-1 px-4 space-y-1">
        <a
          href="dashboard.html"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-slate-500 hover:text-slate-900 hover:bg-slate-100 font-medium transition-colors"
        >
          <i class="bi bi-columns-gap"></i>
          Dashboard
        </a>
        <a
          href="atletas.html"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-all"
        >
          <i class="bi bi-people"></i>
          Atletas
        </a>
        <a
          href="finance.html"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-all"
        >
          <i class="bi bi-cash-coin"></i>
          Finanzas
        </a>
        <a
          href="progreso.html"
          class="flex items-center gap-3 px-3 py-2 rounded-md bg-slate-100 text-sky-500 transition-all"
        >
          <i class="bi bi-clipboard-data"></i>
          Reportes
        </a>
        <a
          href="configuracion.html"
          class="flex items-center gap-3 px-3 py-2 rounded-md text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-all"
        >
          <i class="bi bi-gear"></i>
          Configuración
        </a>
      </nav>

      <div class="p-4 border-t border-slate-200">
        <div class="flex items-center gap-3 p-2 rounded-lg">
          <img src="https://st2.depositphotos.com/4196725/6217/i/450/depositphotos_62170405-stock-photo-young-cool-black-man-proud.jpg" alt="Trainer" class="w-10 h-10 rounded-full border border-slate-300" />
          <div>
            <p id="sidebar-name" class="text-sm font-semibold">Trainer</p>
            <p class="text-xs text-slate-400 uppercase tracking-wider">Coach</p>
          </div>
        </div>
        <button onclick="sessionStorage.clear(); window.location.href='login.html'" class="mt-2 w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-500 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors">
          <i class="bi bi-box-arrow-right"></i> Cerrar sesion
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 flex-1 flex flex-col min-h-screen">
      <!-- Header -->
      <header
        class="p-8 pb-4 flex flex-col md:flex-row md:items-center justify-between gap-4"
      >
        <div>
          <h2 class="text-3xl font-bold tracking-tight">Reportes</h2>
          <p class="text-slate-500 mt-1">Progreso y carga de entrenamiento</p>
        </div>
        <div class="flex gap-3">
          <button
            class="px-4 py-2 border border-slate-300 rounded-md text-sm font-medium hover:bg-slate-200 transition-colors inline-flex items-center gap-2"
          >
            <i class="bi bi-box-arrow-down"></i>
            EXPORTAR .CSV
          </button>
        </div>
      </header>

      <!-- Stats Grid -->
      <section class="p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <div
          class="p-6 bg-white border border-slate-200 rounded-xl flex items-center gap-4"
        >
          <div
            class="w-12 h-12 rounded-lg bg-sky-500/10 flex items-center justify-center text-sky-500"
          >
            <i class="bi bi-bar-chart-line"></i>
          </div>
          <div>
            <p class="text-2xl font-bold">78%</p>
            <p class="text-sm text-slate-500">Cumplimiento global</p>
          </div>
        </div>

        <div
          class="p-6 bg-white border border-slate-200 rounded-xl flex items-center gap-4"
        >
          <div
            class="w-12 h-12 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-500"
          >
            <i class="bi bi-activity"></i>
          </div>
          <div>
            <p class="text-2xl font-bold">142</p>
            <p class="text-sm text-slate-500">Sesiones este mes</p>
          </div>
        </div>

        <div
          class="p-6 bg-white border border-slate-200 rounded-xl flex items-center gap-4"
        >
          <div
            class="w-12 h-12 rounded-lg bg-amber-500/10 flex items-center justify-center text-amber-500"
          >
            <i class="bi bi-lightning-charge"></i>
          </div>
          <div>
            <p class="text-2xl font-bold">68 km</p>
            <p class="text-sm text-slate-500">Volumen promedio</p>
          </div>
        </div>

        <div
          class="p-6 bg-white border border-slate-200 rounded-xl flex items-center gap-4"
        >
          <div
            class="w-12 h-12 rounded-lg bg-red-500/10 flex items-center justify-center text-red-500"
          >
            <i class="bi bi-heart-pulse"></i>
          </div>
          <div>
            <p class="text-2xl font-bold">143</p>
            <p class="text-sm text-slate-500">FC media global</p>
          </div>
        </div>
      </section>

      <!-- Progress Table -->
      <section class="px-8 pb-8">
        <div
          class="bg-white border border-slate-200 rounded-xl overflow-hidden"
        >
          <div
            class="p-6 border-b border-slate-200 flex flex-col sm:flex-row sm:items-center justify-between gap-4"
          >
            <h3 class="text-lg font-semibold">Progreso por Atleta</h3>
            <div class="relative">
              <i
                class="bi bi-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
              ></i>
              <input
                type="text"
                placeholder="Buscar ..."
                class="bg-white border border-slate-200 rounded-md pl-10 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300 transition-all w-full sm:w-64"
              />
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead>
                <tr
                  class="text-slate-400 text-xs uppercase tracking-wider border-b border-slate-200 bg-slate-50"
                >
                  <th class="px-6 py-4 font-medium">Atleta</th>
                  <th class="px-6 py-4 font-medium">Cumplimiento</th>
                  <th class="px-6 py-4 font-medium">Volumen semanal</th>
                  <th class="px-6 py-4 font-medium">FC media</th>
                  <th class="px-6 py-4 font-medium">Carga</th>
                  <th class="px-6 py-4 font-medium text-right">Acciones</th>
                </tr>
              </thead>
              <tbody id="progress-tbody" class="divide-y divide-slate-200"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="../assets/js/progreso.js"></script>
  </body>
</html>
